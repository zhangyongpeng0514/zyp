name: ollvm17-android-arm64

on:
  workflow_dispatch:

env:
  LLVM_VER: "17.0.6"
  NDK_VER: "r26d"
  API: "21"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/lib/node_modules || true
          sudo apt-get clean
          df -h /

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake ccache python3 wget xz-utils unzip clang lld file
          cmake --version
          ninja --version

      - name: Setup NDK
        run: |
          cd /opt
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip
          unzip -q android-ndk-${NDK_VER}-linux.zip
          echo "NDK=/opt/android-ndk-${NDK_VER}" >> $GITHUB_ENV

      - name: Download LLVM source
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/llvm-project-${LLVM_VER}.src.tar.xz
          tar -xf llvm-project-${LLVM_VER}.src.tar.xz
          mv llvm-project-${LLVM_VER}.src llvm-src
          echo "SRC=$PWD/llvm-src" >> $GITHUB_ENV

      - name: Overlay DreamSoule passes
        run: |
          git clone --depth 1 https://github.com/DreamSoule/ollvm17.git ollvm17
          cp -rf ollvm17/llvm-project/llvm/lib/Passes/* "$SRC/llvm/lib/Passes/"
          ls "$SRC/llvm/lib/Passes/Obfuscation/"

      - name: Apply patches
        run: |
          chmod +x patch_ollvm.sh
          bash patch_ollvm.sh "$SRC"

      - name: ccache restore
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ollvm17-android-${{ github.sha }}
          restore-keys: |
            ollvm17-android-

      - name: ccache config
        run: |
          ccache -M 5G
          ccache -z

      - name: Stage1 host tablegen
        run: |
          cmake -G Ninja -S "$SRC/llvm" -B build-host -DCMAKE_BUILD_TYPE=Release -DLLVM_ENABLE_PROJECTS=clang -DLLVM_TARGETS_TO_BUILD=AArch64 -DLLVM_ENABLE_ASSERTIONS=OFF -DCMAKE_CXX_FLAGS="-Wno-invalid-utf8 -Wno-error" -DCMAKE_C_FLAGS="-Wno-invalid-utf8 -Wno-error" -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build-host llvm-tblgen clang-tblgen
          ls -la build-host/bin/llvm-tblgen build-host/bin/clang-tblgen

      - name: Stage2 cross compile clang
        run: |
          cmake -G Ninja -S "$SRC/llvm" -B build-android -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-${API} -DANDROID_STL=c++_static -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-g0 -Wno-invalid-utf8 -Wno-error" -DCMAKE_C_FLAGS="-Wno-invalid-utf8 -Wno-error" -DLLVM_ENABLE_PROJECTS=clang -DLLVM_TARGETS_TO_BUILD=AArch64 -DLLVM_TABLEGEN=$PWD/build-host/bin/llvm-tblgen -DCLANG_TABLEGEN=$PWD/build-host/bin/clang-tblgen -DLLVM_HOST_TRIPLE=aarch64-linux-android${API} -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-android${API} -DLLVM_TARGET_ARCH=AArch64 -DLLVM_ENABLE_ASSERTIONS=OFF -DLLVM_ENABLE_PIC=ON -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF -DCLANG_ENABLE_ARCMT=OFF -DCLANG_ENABLE_STATIC_ANALYZER=OFF -DLLVM_ENABLE_TERMINFO=OFF -DLLVM_ENABLE_ZLIB=OFF -DLLVM_ENABLE_ZSTD=OFF -DLLVM_ENABLE_LIBXML2=OFF -DLLVM_ENABLE_LIBEDIT=OFF -DLLVM_BUILD_LLVM_DYLIB=OFF -DLLVM_LINK_LLVM_DYLIB=OFF -DLLVM_PARALLEL_LINK_JOBS=1 -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          DESTDIR=$PWD/install ninja -C build-android install-clang install-clang-resource-headers install-opt
          ccache -s

      - name: Strip and package
        run: |
          STRIP=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          for b in $(find install/usr/local/bin -type f); do
            $STRIP --strip-all "$b" 2>/dev/null || true
          done
          cd install/usr/local
          tar -czf ../../ollvm17-clang-android-arm64.tar.gz bin lib
          cd ../../
          ls -lh ollvm17-clang-android-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm17-clang-android-arm64
          path: ollvm17-clang-android-arm64.tar.gz
          retention-days: 7
