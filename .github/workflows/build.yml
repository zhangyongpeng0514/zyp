name: Build DreamSoule OLLVM17 AArch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build python3 git wget unzip zlib1g-dev

      - name: Download Android NDK r26d
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          rm android-ndk-r26d-linux.zip
          echo "NDK=$HOME/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone DreamSoule ollvm17 (already integrated LLVM 17 tree)
        run: |
          cd $HOME
          git clone --depth=1 https://github.com/DreamSoule/ollvm17.git ollvm17
          echo "=== 确认目录结构 ==="
          ls -la ollvm17/
          echo "--- 找 llvm 源码根 ---"
          find ollvm17 -maxdepth 2 -name "CMakeLists.txt" -path "*llvm*" | head -5
          echo "--- 确认 Obfuscation 已集成 ---"
          find ollvm17 -type d -name "Obfuscation" | head -3
          echo "--- 确认 PassBuilder 已 patch (应该能搜到 s_obf_fla) ---"
          grep -rl "s_obf_fla" ollvm17/ 2>/dev/null | head -3

      - name: Locate LLVM source root
        run: |
          cd $HOME/ollvm17
          # DreamSoule 结构可能是 llvm-project/llvm/ 或直接 llvm/
          if [ -f llvm-project/llvm/CMakeLists.txt ]; then
            echo "LLVM_SRC=$HOME/ollvm17/llvm-project/llvm" >> $GITHUB_ENV
            echo "找到: llvm-project/llvm"
          elif [ -f llvm/CMakeLists.txt ]; then
            echo "LLVM_SRC=$HOME/ollvm17/llvm" >> $GITHUB_ENV
            echo "找到: llvm"
          else
            echo "!!! 找不到 llvm/CMakeLists.txt，打印目录结构 !!!"
            find . -maxdepth 3 -name "CMakeLists.txt" | head -20
            exit 1
          fi

      - name: Stage 1 - Build host clang (x86_64 Linux)
        run: |
          cd $HOME/ollvm17
          mkdir -p build-host && cd build-host

          cmake -G Ninja $LLVM_SRC \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DCMAKE_INSTALL_PREFIX=$HOME/host-clang

          ninja -j$(nproc) clang lld llvm-config llvm-tblgen clang-tblgen
          ninja install

          echo "=== host clang 验证 ==="
          ls -la $HOME/host-clang/bin/ | grep -E "tblgen|clang|llvm" | head -20

          cd $HOME && rm -rf ollvm17/build-host
          df -h

      - name: Stage 2 - Cross-compile clang for aarch64-android
        run: |
          cd $HOME/ollvm17
          mkdir -p build-android && cd build-android

          NDK_TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          SYSROOT=$NDK_TOOLCHAIN/sysroot

          cmake -G Ninja $LLVM_SRC \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="AArch64" \
            -DLLVM_DEFAULT_TARGET_TRIPLE="aarch64-linux-android21" \
            -DLLVM_HOST_TRIPLE="aarch64-linux-android21" \
            -DLLVM_TARGET_ARCH="AArch64" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_LIBEDIT=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DCLANG_BUILD_TOOLS=ON \
            -DLLVM_BUILD_UTILS=OFF \
            -DLLVM_TABLEGEN=$HOME/host-clang/bin/llvm-tblgen \
            -DCLANG_TABLEGEN=$HOME/host-clang/bin/clang-tblgen \
            -DCMAKE_C_COMPILER=$NDK_TOOLCHAIN/bin/aarch64-linux-android21-clang \
            -DCMAKE_CXX_COMPILER=$NDK_TOOLCHAIN/bin/aarch64-linux-android21-clang++ \
            -DCMAKE_AR=$NDK_TOOLCHAIN/bin/llvm-ar \
            -DCMAKE_RANLIB=$NDK_TOOLCHAIN/bin/llvm-ranlib \
            -DCMAKE_STRIP=$NDK_TOOLCHAIN/bin/llvm-strip \
            -DCMAKE_SYSROOT=$SYSROOT \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CXX_FLAGS="-O2 -fPIC" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -Wl,--gc-sections" \
            -DCMAKE_INSTALL_PREFIX=$HOME/ollvm17-aarch64

          ninja -j$(nproc) clang
          ninja install-clang

          df -h

      - name: Strip and package
        run: |
          cd $HOME/ollvm17-aarch64
          find . -type f \( -name "clang*" -o -name "llvm-*" \) -exec \
            $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-all {} \; 2>/dev/null || true
          echo "=== 产物大小 ==="
          du -sh .
          ls -la bin/

          cd $HOME
          tar czf dreamsoule-ollvm17-aarch64.tar.gz -C $HOME ollvm17-aarch64
          ls -lh dreamsoule-ollvm17-aarch64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamsoule-ollvm17-aarch64
          path: ~/dreamsoule-ollvm17-aarch64.tar.gz
          retention-days: 30
