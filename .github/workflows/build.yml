
name: ollvm17-android-arm64

on:
  workflow_dispatch:          # 手动点按钮触发
    inputs:
      ndk_version:
        description: "Android NDK 版本"
        default: "r26d"
        required: false

env:
  LLVM_VER: "17.0.6"
  NDK_VER: "r26d"
  API: "21"                   # android-21 = Android 5.0，akode 跑现代安卓没问题

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360      # 贴近 6h 上限。第一次无缓存最危险，缓存命中后会很快

    steps:

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/lib/node_modules || true
          sudo apt-get clean
          df -h /


      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake ccache python3 wget xz-utils unzip clang lld
          cmake --version && ninja --version

      - name: Setup NDK
        run: |
          cd /opt
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip
          unzip -q android-ndk-${NDK_VER}-linux.zip
          echo "NDK=/opt/android-ndk-${NDK_VER}" >> $GITHUB_ENV
          ls /opt/android-ndk-${NDK_VER}/build/cmake/android.toolchain.cmake

      # ---------------------------------------------------------------
      # 3. 下 LLVM 17.0.6 官方源码（整包 monorepo）
      # ---------------------------------------------------------------
      - name: Download LLVM source
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/llvm-project-${LLVM_VER}.src.tar.xz
          tar -xf llvm-project-${LLVM_VER}.src.tar.xz
          mv llvm-project-${LLVM_VER}.src llvm-src
          echo "SRC=$PWD/llvm-src" >> $GITHUB_ENV

      - name: Overlay DreamSoule obfuscation passes
        run: |
          git clone --depth 1 https://github.com/DreamSoule/ollvm17.git ollvm17
          cp -rf ollvm17/llvm-project/llvm/lib/Passes/* "$SRC/llvm/lib/Passes/"
          echo "--- 覆盖后 Passes 目录 ---"
          ls "$SRC/llvm/lib/Passes/" "$SRC/llvm/lib/Passes/Obfuscation/"

      - name: Patch splice (LLVM17 private API)
        run: |
          F="$SRC/llvm/lib/Passes/Obfuscation/IPObfuscationContext.cpp"
          before=$(grep -c "getBasicBlockList" "$F" || true)
          sed -i 's#NF->getBasicBlockList()\.splice(NF->begin(), F->getBasicBlockList());#NF->splice(NF->begin(), F);#' "$F"
          echo "patch 前 getBasicBlockList 出现 $before 次，patch 后："
          grep -n "splice\|getBasicBlockList" "$F" || true
          # 兜底自检：若仍残留 getBasicBlockList 说明上游改了源码，直接让 CI 失败提醒
          if grep -q "getBasicBlockList" "$F"; then
            echo "::error::splice patch 未完全命中，IPObfuscationContext.cpp 源码可能变了，需更新 sed"
            exit 1
          fi

      - name: Patch missing valueEscapes (DreamSoule bug)
        run: |
          F="$SRC/llvm/lib/Passes/Obfuscation/Utils.cpp"
          if grep -q "valueEscapes" "$F" && ! grep -q "static bool valueEscapes" "$F"; then
            python3 - "$F" <<'PY'
import sys
p = sys.argv[1]
s = open(p, encoding="utf-8").read()
anchor = "void llvm::fixStack(Function &F) {"
if anchor not in s:
    sys.exit("::error::fixStack 锚点未找到，Utils.cpp 源码结构变了，需更新 patch")
helper = '''// === 自动补丁：取自 LLVM 官方 Reg2Mem.cpp:41 (llvmorg-17.0.6) ===
// DreamSoule 漏搬此辅助函数，导致 Utils.cpp 报 undeclared identifier 'valueEscapes'
static bool valueEscapes(const Instruction &Inst) {
  if (!Inst.getType()->isSized())
    return false;
  const BasicBlock *BB = Inst.getParent();
  for (const User *U : Inst.users()) {
    const Instruction *UI = cast<Instruction>(U);
    if (UI->getParent() != BB || isa<PHINode>(UI))
      return true;
  }
  return false;
}

'''
s = s.replace(anchor, helper + anchor, 1)
open(p, "w", encoding="utf-8").write(s)
print("valueEscapes 已插入")
PY
          else
            echo "已存在 valueEscapes 定义或无需修补，跳过"
          fi
          echo "--- 确认 ---"
          grep -n "static bool valueEscapes\|valueEscapes(I)\|llvm::fixStack" "$F" || true

      - name: Fix source file encoding (GBK -> UTF-8)
        run: |
          sudo apt-get install -y file
          cd "$SRC/llvm/lib/Passes/Obfuscation"
          for f in $(find . -name "*.cpp" -o -name "*.h"); do
            enc=$(file -b --mime-encoding "$f")
            case "$enc" in
              us-ascii|utf-8) ;;                       # 已 OK，跳过
              *)
                echo "转码 [$enc -> utf-8]: $f"
                iconv -f GBK -t UTF-8 "$f" -o "$f.u8" && mv "$f.u8" "$f"
                ;;
            esac
          done
          echo "--- 复查（无输出=全部正常）---"
          for f in $(find . -name "*.cpp" -o -name "*.h"); do
            enc=$(file -b --mime-encoding "$f")
            [ "$enc" != "us-ascii" ] && [ "$enc" != "utf-8" ] && echo "仍异常: $enc $f" || true
          done

  
      - name: ccache restore
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ollvm17-android-${{ github.sha }}
          restore-keys: |
            ollvm17-android-
      - name: ccache config
        run: |
          ccache -M 5G
          ccache -z

      - name: Stage1 - host tablegen
        run: |
          cmake -G Ninja -S "$SRC/llvm" -B build-host \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DLLVM_TARGETS_TO_BUILD=AArch64 \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DCMAKE_CXX_FLAGS="-Wno-invalid-utf8 -Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-invalid-utf8 -Wno-error" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build-host llvm-tblgen clang-tblgen
          ls -la build-host/bin/llvm-tblgen build-host/bin/clang-tblgen

      - name: Stage2 - cross compile clang (arm64)
        run: |
          cmake -G Ninja -S "$SRC/llvm" -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${API} \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-g0 -Wno-invalid-utf8 -Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-invalid-utf8 -Wno-error" \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DLLVM_TARGETS_TO_BUILD=AArch64 \
            -DLLVM_TABLEGEN=$PWD/build-host/bin/llvm-tblgen \
            -DCLANG_TABLEGEN=$PWD/build-host/bin/clang-tblgen \
            -DLLVM_HOST_TRIPLE=aarch64-linux-android${API} \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-android${API} \
            -DLLVM_TARGET_ARCH=AArch64 \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DCLANG_ENABLE_ARCMT=OFF \
            -DCLANG_ENABLE_STATIC_ANALYZER=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_LIBEDIT=OFF \
            -DLLVM_BUILD_LLVM_DYLIB=OFF \
            -DLLVM_LINK_LLVM_DYLIB=OFF \
            -DLLVM_PARALLEL_LINK_JOBS=1 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          # 只编必要产物：clang(含驱动+后端) + opt(手动调试 pass 用)
          DESTDIR=$PWD/install ninja -C build-android \
            install-clang \
            install-clang-resource-headers \
            install-opt
          ccache -s

      - name: Strip & package
        run: |
          STRIP=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          find install/usr/local/bin -type f -exec file {} \; | grep ELF | cut -d: -f1 | while read b; do
            $STRIP --strip-all "$b" 2>/dev/null || true
          done
          cd install/usr/local
          tar -czf ../../ollvm17-clang-android-arm64.tar.gz bin lib
          cd ../../
          ls -lh ollvm17-clang-android-arm64.tar.gz
          du -sh install/usr/local/bin install/usr/local/lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm17-clang-android-arm64
          path: ollvm17-clang-android-arm64.tar.gz
          retention-days: 7
