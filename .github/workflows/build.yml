name: Diagnose OLLVM Source

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
      - name: Install minimal deps
        run: |
          sudo apt update
          sudo apt install -y git
      
      - name: Clone obfuscator-ollvm source
        run: |
          cd $HOME
          git clone --depth=1 https://github.com/AYssu/obfuscator-ollvm.git ollvm-src
          du -sh ollvm-src
      
      - name: "1. Obfuscation 目录结构"
        run: |
          cd $HOME/ollvm-src
          echo "=== llvm/include/llvm/Transforms/Obfuscation 目录下的所有文件 ==="
          ls -la llvm/include/llvm/Transforms/Obfuscation/ 2>/dev/null || echo "NOT EXIST"
          echo ""
          echo "=== llvm/lib/Transforms/Obfuscation 目录下的所有文件 ==="
          ls -la llvm/lib/Transforms/Obfuscation/ 2>/dev/null || echo "NOT EXIST"
          echo ""
          echo "=== 全仓库搜索包含 Obfuscation 的目录 ==="
          find . -type d -name "Obfuscation" 2>/dev/null
          echo ""
          echo "=== 全仓库搜索 obfuscation 相关 .h .cpp 文件 ==="
          find . -type f \( -name "BogusControlFlow*" -o -name "Flattening*" -o -name "StringEncryption*" \) 2>/dev/null | head -30
      
      - name: "2. Obfuscation 目录内 CMakeLists.txt"
        run: |
          cd $HOME/ollvm-src
          echo "=== llvm/lib/Transforms/Obfuscation/CMakeLists.txt 是否存在? ==="
          if [ -f llvm/lib/Transforms/Obfuscation/CMakeLists.txt ]; then
            echo "YES, content:"
            cat llvm/lib/Transforms/Obfuscation/CMakeLists.txt
          else
            echo "NO - need to create one"
          fi
      
      - name: "3. llvm/lib/Transforms/CMakeLists.txt 内容"
        run: |
          cd $HOME/ollvm-src
          echo "=== 完整内容 ==="
          cat llvm/lib/Transforms/CMakeLists.txt
          echo ""
          echo "=== 是否已包含 Obfuscation? ==="
          grep -i "obfuscation" llvm/lib/Transforms/CMakeLists.txt || echo "NOT MENTIONED"
      
      - name: "4. llvm/lib/Passes/PassBuilder.cpp 的 include 区"
        run: |
          cd $HOME/ollvm-src
          echo "=== 前 80 行（include 区域）==="
          head -80 llvm/lib/Passes/PassBuilder.cpp
          echo ""
          echo "=== 搜索 cl::opt 定义位置 ==="
          grep -n "static cl::opt" llvm/lib/Passes/PassBuilder.cpp | head -20
      
      - name: "5. PassBuilder::PassBuilder 构造函数位置"
        run: |
          cd $HOME/ollvm-src
          echo "=== 找到构造函数定义 ==="
          grep -n "^PassBuilder::PassBuilder" llvm/lib/Passes/PassBuilder.cpp
          echo ""
          echo "=== 找到 registerPipelineStartEPCallback 现有调用 ==="
          grep -n "registerPipelineStartEPCallback\|registerPipelineParsingCallback" llvm/lib/Passes/PassBuilder.cpp | head -20
      
      - name: "6. Obfuscation 头文件 include 路径检查"
        run: |
          cd $HOME/ollvm-src
          echo "=== Obfuscation cpp 文件如何引用自己的头文件 ==="
          if [ -d llvm/lib/Transforms/Obfuscation ]; then
            grep -h '#include' llvm/lib/Transforms/Obfuscation/*.cpp 2>/dev/null | grep -i "obfuscation\|flattening\|bogus\|substitution" | sort -u | head -20
          fi
          echo ""
          echo "=== 头文件目录里的所有 .h ==="
          ls llvm/include/llvm/Transforms/Obfuscation/ 2>/dev/null || echo "no include dir"
      
      - name: "7. Obfuscation/Utils.h 内容（看 LLVM API 兼容性）"
        run: |
          cd $HOME/ollvm-src
          echo "=== 是否存在 Utils.h ==="
          find . -name "Utils.h" -path "*Obfuscation*" -exec echo "FOUND: {}" \; -exec cat {} \; 2>/dev/null | head -100
      
      - name: "8. 检测是否有 compat 目录（兼容层）"
        run: |
          cd $HOME/ollvm-src
          echo "=== compat 目录 ==="
          find . -type d -name "compat" -path "*Obfuscation*" 2>/dev/null
          echo ""
          echo "=== CallSite.h 是否存在（LLVM 16+ 移除的 API）==="
          find . -name "CallSite.h" -path "*Obfuscation*" 2>/dev/null | xargs ls -la 2>/dev/null
      
      - name: "9. README 内容"
        run: |
          cd $HOME/ollvm-src
          echo "=== README.md ==="
          cat README.md 2>/dev/null | head -80 || echo "NO README"
          echo ""
          echo "=== README*.md 列表 ==="
          ls README* 2>/dev/null
      
      - name: "10. Obfuscation .cpp 文件 LLVM API 兼容性扫描"
        run: |
          cd $HOME/ollvm-src
          echo "=== 搜索可能不兼容 LLVM 21 的旧 API ==="
          if [ -d llvm/lib/Transforms/Obfuscation ]; then
            cd llvm/lib/Transforms/Obfuscation
            echo "--- getPointerElementType（LLVM 16+ 移除）---"
            grep -rn "getPointerElementType" . 2>/dev/null | head -5
            echo ""
            echo "--- PointerType::get(Type, AS)（LLVM 17+ 改了）---"
            grep -rn "PointerType::get" . 2>/dev/null | head -5
            echo ""
            echo "--- CallSite 类（LLVM 14+ 移除）---"
            grep -rn "CallSite " . 2>/dev/null | head -5
            echo ""
            echo "--- opaque pointer 相关 ---"
            grep -rn "OpaquePointer\|setOpaquePointers" . 2>/dev/null | head -5
          fi
      
      - name: "11. 仓库 commit 信息"
        run: |
          cd $HOME/ollvm-src
          echo "=== 最近 5 个 commit ==="
          git log --oneline -5
          echo ""
          echo "=== 仓库总大小 ==="
          du -sh .
